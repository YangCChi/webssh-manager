version: "3.9"

services:
  webssh:
    build:
      context: .
      dockerfile: Dockerfile
    image: webssh-manager:latest
    container_name: webssh-manager
    restart: unless-stopped
    ports:
      - "${PORT:-8080}:8000"
    volumes:
      - webssh-data:/app/data
      - webssh-logs:/app/logs
    environment:
      SECRET_KEY: ${SECRET_KEY:-change-this-secret-key-in-production}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-change-this-encryption-key-in-production}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin123}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      SESSION_KEEPALIVE_HOURS: 24
      MAX_SESSIONS_PER_USER: 20
      LOG_LEVEL: INFO
      ALLOWED_IPS: ${ALLOWED_IPS:-}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - webssh-net

  nginx:
    image: nginx:alpine
    container_name: webssh-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./docker/certs:/etc/nginx/certs:ro
    depends_on:
      - webssh
    networks:
      - webssh-net
    profiles:
      - with-nginx

volumes:
  webssh-data:
    driver: local
  webssh-logs:
    driver: local

networks:
  webssh-net:
    driver: bridge
